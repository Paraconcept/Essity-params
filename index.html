<!DOCTYPE html>
<html lang="fr" data-theme="light">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="theme-color" content="#000B5A">
  <title>ESSITY Params</title>
  <link rel="manifest" href="manifest.json">
  <link rel="apple-touch-icon" href="icons/apple-touch-icon.png">
  <link rel="icon" type="image/png" sizes="192x192" href="icons/icon-192.png">
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <header class="app-header">
    <h1><span class="logo-accent">ESSITY</span> <span class="logo-text">Params</span></h1>
    <div class="header-actions">
      <button id="btn-export" aria-label="Exporter les données" title="Exporter">&#128228;</button>
      <button id="btn-import-trigger" aria-label="Importer les données" title="Importer">&#128229;</button>
      <button id="theme-toggle" aria-label="Changer le theme">&#9790;</button>
    </div>
    <input type="file" id="file-import" accept=".json" style="display:none">
  </header>
  <main id="app"></main>
  <script src="js/db.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/sortablejs@1.15.2/Sortable.min.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
